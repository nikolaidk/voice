<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg"><style>.r{opacity:0;animation:f .5s ease forwards}.r1{animation-delay:.1s}.r2{animation-delay:.4s}.r3{animation-delay:.7s}.r4{animation-delay:1s}.r5{animation-delay:1.3s}@keyframes f{to{opacity:1}}</style><g font-family="sans-serif"><g class="r r1"><rect x="60" y="70" width="260" height="70" rx="10" fill="#1e222a" stroke="#e8a13c" stroke-width="2"/><text x="85" y="115" fill="#e8a13c" font-size="28">Audio</text><text x="360" y="115" fill="#f2f0eb" font-size="26">just listen to the episode</text></g><g class="r r2"><rect x="60" y="165" width="260" height="70" rx="10" fill="#1e222a" stroke="#e8a13c" stroke-width="2"/><text x="85" y="210" fill="#e8a13c" font-size="28">Transcript</text><text x="360" y="210" fill="#f2f0eb" font-size="26">read it, timestamped</text></g><g class="r r3"><rect x="60" y="260" width="260" height="70" rx="10" fill="#1e222a" stroke="#e8a13c" stroke-width="2"/><text x="85" y="305" fill="#e8a13c" font-size="28">Web show</text><text x="360" y="305" fill="#f2f0eb" font-size="26">send one file to anyone</text></g><g class="r r4"><rect x="60" y="355" width="260" height="70" rx="10" fill="#1e222a" stroke="#e8a13c" stroke-width="2"/><text x="85" y="400" fill="#e8a13c" font-size="28">Video</text><text x="360" y="400" fill="#f2f0eb" font-size="26">upload anywhere</text></g><g class="r r5"><rect x="60" y="450" width="260" height="70" rx="10" fill="#1e222a" stroke="#e8a13c" stroke-width="2"/><text x="85" y="495" fill="#e8a13c" font-size="28">PowerPoint</text><text x="360" y="495" fill="#f2f0eb" font-size="26">present it yourself</text></g></g></svg>