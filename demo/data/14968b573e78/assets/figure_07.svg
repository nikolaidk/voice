<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg"><style>.ln{stroke-dasharray:760;stroke-dashoffset:0;animation:draw 1.6s ease both}@keyframes draw{from{stroke-dashoffset:760}to{stroke-dashoffset:0}}.d{opacity:1;animation:pop .5s ease both}.d2{animation-delay:.4s}.d3{animation-delay:.8s}.d4{animation-delay:1.2s}@keyframes pop{from{opacity:0}to{opacity:1}}</style><text x="500" y="110" font-family="sans-serif" font-size="34" fill="#f2f0eb" text-anchor="middle">One assembly line, four stations</text><line class="ln" x1="110" y1="300" x2="890" y2="300" stroke="#9aa0ab" stroke-width="2" opacity="0.5"/><g class="d"><circle cx="140" cy="300" r="22" fill="#e8a13c"/><text x="140" y="370" font-family="sans-serif" font-size="26" fill="#f2f0eb" text-anchor="middle">Script</text><text x="140" y="405" font-family="sans-serif" font-size="22" fill="#9aa0ab" text-anchor="middle">words written</text></g><g class="d d2"><circle cx="380" cy="300" r="22" fill="#e8a13c"/><text x="380" y="370" font-family="sans-serif" font-size="26" fill="#f2f0eb" text-anchor="middle">Slides</text><text x="380" y="405" font-family="sans-serif" font-size="22" fill="#9aa0ab" text-anchor="middle">visuals designed</text></g><g class="d d3"><circle cx="620" cy="300" r="22" fill="#e8a13c"/><text x="620" y="370" font-family="sans-serif" font-size="26" fill="#f2f0eb" text-anchor="middle">Voice</text><text x="620" y="405" font-family="sans-serif" font-size="22" fill="#9aa0ab" text-anchor="middle">voice recorded</text></g><g class="d d4"><circle cx="860" cy="300" r="22" fill="#e8a13c"/><text x="860" y="370" font-family="sans-serif" font-size="26" fill="#f2f0eb" text-anchor="middle">Outputs</text><text x="860" y="405" font-family="sans-serif" font-size="22" fill="#9aa0ab" text-anchor="middle">packaged</text></g><text x="500" y="500" font-family="sans-serif" font-size="24" fill="#9aa0ab" text-anchor="middle">Change any station — everything after it updates</text></svg>