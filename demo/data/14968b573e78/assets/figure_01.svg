<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg"><style>.c{opacity:1;animation:f .6s ease both}.c2{animation-delay:.15s}.c3{animation-delay:.3s}.c4{animation-delay:.45s}@keyframes f{from{opacity:0}to{opacity:1}}</style><text x="40" y="90" font-family="sans-serif" font-size="34" fill="#f2f0eb">Give it a link or PDF — it produces four things</text><g class="c"><rect x="40" y="170" width="210" height="300" rx="12" fill="#1e222a" stroke="#e8a13c" stroke-width="2"/><text x="145" y="260" font-family="sans-serif" font-size="28" fill="#e8a13c" text-anchor="middle">Audio</text><text x="145" y="300" font-family="sans-serif" font-size="24" fill="#f2f0eb" text-anchor="middle">episode</text><text x="145" y="360" font-family="sans-serif" font-size="22" fill="#9aa0ab" text-anchor="middle">spoken</text><text x="145" y="388" font-family="sans-serif" font-size="22" fill="#9aa0ab" text-anchor="middle">voice-over</text></g><g class="c c2"><rect x="270" y="170" width="210" height="300" rx="12" fill="#1e222a" stroke="#c98a34" stroke-width="2"/><text x="375" y="260" font-family="sans-serif" font-size="28" fill="#e8a13c" text-anchor="middle">Slideshow</text><text x="375" y="360" font-family="sans-serif" font-size="22" fill="#9aa0ab" text-anchor="middle">slides synced</text><text x="375" y="388" font-family="sans-serif" font-size="22" fill="#9aa0ab" text-anchor="middle">to the voice</text></g><g class="c c3"><rect x="500" y="170" width="210" height="300" rx="12" fill="#1e222a" stroke="#c98a34" stroke-width="2"/><text x="605" y="260" font-family="sans-serif" font-size="28" fill="#e8a13c" text-anchor="middle">Video</text><text x="605" y="300" font-family="sans-serif" font-size="24" fill="#f2f0eb" text-anchor="middle">file</text><text x="605" y="360" font-family="sans-serif" font-size="22" fill="#9aa0ab" text-anchor="middle">upload</text><text x="605" y="388" font-family="sans-serif" font-size="22" fill="#9aa0ab" text-anchor="middle">anywhere</text></g><g class="c c4"><rect x="73