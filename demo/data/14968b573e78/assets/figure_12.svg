<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg"><style>.n{opacity:1;animation:f .6s ease both}.n2{animation-delay:.3s}.n3{animation-delay:.6s}@keyframes f{from{opacity:0}to{opacity:1}}.ar{stroke-dasharray:300;stroke-dashoffset:0;animation:dr 1.4s ease both}@keyframes dr{from{stroke-dashoffset:300}to{stroke-dashoffset:0}}</style><text x="500" y="80" font-family="sans-serif" font-size="32" fill="#f2f0eb" text-anchor="middle">Review → Revise → Re-render</text><path class="ar" d="M 340 210 A 220 220 0 0 1 660 210" fill="none" stroke="#9aa0ab" stroke-width="2" opacity="0.6"/><path class="ar" d="M 690 250 A 220 220 0 0 1 560 490" fill="none" stroke="#9aa0ab" stroke-width="2" opacity="0.6"/><path class="ar" d="M 440 490 A 220 220 0 0 1 310 250" fill="none" stroke="#9aa0ab" stroke-width="2" opacity="0.6"/><g class="n"><circle cx="260" cy="210" r="85" fill="#1e222a" stroke="#e8a13c" stroke-width="2"/><text x="260" y="215" font-family="sans-serif" font-size="25" fill="#f2f0eb" text-anchor="middle">Review</text><text x="260" y="245" font-family="sans-serif" font-size="20" fill="#9aa0ab" text-anchor="middle">slide by slide</text></g><g class="n n2"><circle cx="740" cy="210" r="85" fill="#1e222a" stroke="#e8a13c" stroke-width="2"/><text x="740" y="205" font-family="sans-serif" font-size="25" fill="#f2f0eb" text-anchor="middle">Revise</text><text x="740" y="235" font-family="sans-serif" font-size="20" fill="#9aa0ab" text-anchor="middle">by line number</text></g><g class="n n3"><circle cx="500" cy="500" r="85" fill="#1e222a" stroke="#e8a13c" stroke-width="2"/><text x="500" y="495" font-family="sans-serif" font-size="25" fill="#f2f0eb" text-anchor="middle">Re-record</text><text x="500" y="525" font-family="sans-serif" font-size="20" fill="#9aa0ab" text-anchor="middle">in ~1–2 min</text></g></svg>