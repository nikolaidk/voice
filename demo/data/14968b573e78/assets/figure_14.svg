<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg"><style>.big{opacity:1;animation:f 1s ease both}.sub{opacity:1;animation:f 1s ease .5s both}@keyframes f{from{opacity:0}to{opacity:1}}</style><text x="500" y="120" font-family="sans-serif" font-size="30" fill="#9aa0ab" text-anchor="middle">Typical model spend, full production</text><text class="big" x="500" y="320" font-family="sans-serif" font-size="150" fill="#e8a13c" text-anchor="middle" font-weight="bold">~40¢</text><text x="500" y="390" font-family="sans-serif" font-size="28" fill="#f2f0eb" text-anchor="middle">usually well under a dollar</text><text class="sub" x="500" y="490" font-family="sans-serif" font-size="26" fill="#9aa0ab" text-anchor="middle">Repeat revisions within minutes ≈ 1/10 price</text><text class="sub" x="500" y="530" font-family="sans-serif" font-size="26" fill="#9aa0ab" text-anchor="middle">So work in focused bursts</text></svg>