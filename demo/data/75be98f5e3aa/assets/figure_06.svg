<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 620'><rect width='1000' height='620' fill='#1e222a'/><text x='60' y='55' fill='#f2f0eb' font-family='Helvetica,Arial,sans-serif' font-size='26' font-weight='bold'>Two opposing trends</text><line x1='120' y1='100' x2='120' y2='520' stroke='#9aa0ab' stroke-width='2'/><line x1='120' y1='520' x2='900' y2='520' stroke='#9aa0ab' stroke-width='2'/><text x='510' y='560' fill='#9aa0ab' font-family='Helvetica,Arial,sans-serif' font-size='16' text-anchor='middle'>Time / chip generations</text><polyline points='140,150 300,230 460,300 620,360 780,400 880,420' fill='none' stroke='#9aa0ab' stroke-width='4'/><polyline points='140,480 300,455 460,410 620,340 780,220 880,130' fill='none' stroke='#e8a13c' stroke-width='4'/><text x='260' y='185' fill='#9aa0ab' font-family='Helvetica,Arial,sans-serif' font-size='18'>Cost to consumers falls</text><text x='540' y='190' fill='#e8a13c' font-family='Helvetica,Arial,sans-serif' font-size='18' font-weight='bold'>Fab &amp; tool costs rise exponentially</text><text x='300' y='500' fill='#9aa0ab' font-family='Helvetica,Arial,sans-serif' font-size='15'>tools double in cost every ~4 years</text></svg>