<svg viewBox='0 0 1000 620' xmlns='http://www.w3.org/2000/svg'><style>.f{opacity:1;animation:fade 2.4s ease forwards}.f2{animation-delay:.3s}.f3{animation-delay:.6s}.f4{animation-delay:.9s}.f5{animation-delay:1.2s}@keyframes fade{from{opacity:0}to{opacity:1}}</style><rect x='60' y='70' width='260' height='90' rx='10' fill='#e8a13c'/><text x='190' y='122' font-family='sans-serif' font-size='28' fill='#1e222a' text-anchor='middle'>Your question</text><line x1='320' y1='115' x2='430' y2='115' stroke='#9aa0ab' stroke-width='3'/><polygon points='430,108 448,115 430,122' fill='#9aa0ab'/><rect x='448' y='70' width='300' height='90' rx='10' fill='none' stroke='#9aa0ab' stroke-width='2'/><text x='598' y='122' font-family='sans-serif' font-size='28' fill='#f2f0eb' text-anchor='middle'>Assistant answers</text><text x='60' y='230' font-family='sans-serif' font-size='26' fill='#9aa0ab'>What silently did not happen:</text><text class='f f2' x='80' y='300' font-family='sans-serif' font-size='26' fill='#f2f0eb'>— No one learns what you're working on</text><text class='f f3' x='80' y='360' font-family='sans-serif' font-size='26' fill='#f2f0eb'>— No mental map of what you know updated</text><text class='f f4' x='80' y='420' font-family='sans-serif' font-size='26' fill='#f2f0eb'>— No warm signal that experience is valued</text><text class='f f5' x='80' y='480' font-family='sans-serif' font-size='26' fill='#f2f0eb'>— No junior overhears and learns for free</text><text class='f f5' x='80' y='540' font-family='sans-serif' font-size='26' fill='#e8a13c'>Knowledge now in one head — gone by lunch</text></svg>