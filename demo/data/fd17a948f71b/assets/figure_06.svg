<svg viewBox='0 0 1000 620' xmlns='http://www.w3.org/2000/svg'><style>.q{opacity:1;animation:pop .7s ease both}.q2{animation-delay:.2s}.q3{animation-delay:.4s}.q4{animation-delay:.6s}@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}</style><g class='q'><rect x='60' y='60' width='420' height='230' rx='12' fill='#1e222a' stroke='#e8a13c' stroke-width='2'/><text x='90' y='120' font-family='sans-serif' font-size='30' fill='#e8a13c'>Socialization</text><text x='90' y='165' font-family='sans-serif' font-size='23' fill='#f2f0eb'>Tacit knowledge moves</text><text x='90' y='200' font-family='sans-serif' font-size='23' fill='#f2f0eb'>through shared work &amp; talk</text><text x='90' y='250' font-family='sans-serif' font-size='22' fill='#9aa0ab'>Nonaka</text></g><g class='q q2'><rect x='520' y='60' width='420' height='230' rx='12' fill='#1e222a' stroke='#e8a13c' stroke-width='2'/><text x='550' y='120' font-family='sans-serif' font-size='30' fill='#e8a13c'>Weak ties</text><text x='550' y='165' font-family='sans-serif' font-size='23' fill='#f2f0eb'>New information travels</text><text x='550' y='200' font-family='sans-serif' font-size='23' fill='#f2f0eb'>through acquaintances</text><text x='550' y='250' font-family='sans-serif' font-size='22' fill='#9aa0ab'>Nature: 61,000 employees</text></g><g class='q q3'><rect x='60' y='320' width='420' height='230' rx='12' fill='#1e222a' stroke='#e8a13c' stroke-width='2'/><text x='90' y='380' font-family='sans-serif' font-size='30' fill='#e8a13c'>Who-knows-what</text><text x='90' y='425' font-family='sans-serif' font-size='23' fill='#f2f0eb'>The map that routes</text><text x='90' y='460' font-family='sans-serif' font-size='23' fill='#f2f0eb'>problems to the right head</text><text x='90' y='510' font-family='sans-serif' font-size='22' fill='#9aa0ab'>Transactive memory</text></g><g class='q q4'><rect x='520' y='320' width='420' height='230' rx='12' fill='#1e222a' stroke='#e8a13c' stroke-width='2'/><text x='550' y='380' font-family='sans-serif' font-size='30' fill='#e8a13c'>Apprenticeship</text><text x='550' y='425' font-family='sans-serif' font-size='23' fill='#f2f0eb'>Juniors become seniors</text><text x='550' y='460' font-family='sans-serif' font-size='23' fill='#f2f0eb'>by legitimate eavesdropping</text><text x='550' y='510' font-family='sans-serif' font-size='22' fill='#9aa0ab'>MIT: cognitive debt</text></g></svg>