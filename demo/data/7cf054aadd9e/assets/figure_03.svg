<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg"><style>.p{opacity:1;animation:f .8s ease both}.p2{animation-delay:.4s}@keyframes f{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}</style><g class="p"><rect x="70" y="120" width="390" height="360" rx="14" fill="#1e222a" stroke="#9aa0ab" stroke-opacity=".3"/><text x="265" y="175" text-anchor="middle" fill="#9aa0ab" font-family="sans-serif" font-size="30">Documents</text><text x="265" y="250" text-anchor="middle" fill="#f2f0eb" font-family="sans-serif" font-size="26">Written once</text><text x="265" y="300" text-anchor="middle" fill="#f2f0eb" font-family="sans-serif" font-size="26">Read seldom</text><text x="265" y="360" text-anchor="middle" fill="#9aa0ab" font-family="sans-serif" font-size="26">Drift silently</text></g><g class="p p2"><rect x="540" y="120" width="390" height="360" rx="14" fill="#1e222a" stroke="#e8a13c"/><text x="735" y="175" text-anchor="middle" fill="#e8a13c" font-family="sans-serif" font-size="30">Tests</text><text x="735" y="250" text-anchor="middle" fill="#f2f0eb" font-family="sans-serif" font-size="26">Run every commit</text><text x="735" y="300" text-anchor="middle" fill="#f2f0eb" font-family="sans-serif" font-size="26">Re-assert forever</text><text x="735" y="360" text-anchor="middle" fill="#e8a13c" font-family="sans-serif" font-size="26">Fail loudly</text></g></svg>